name: Daily Stock Alert

on:
  schedule:
    - cron: '0 12 * * 1-5'
  workflow_dispatch:

jobs:
  send-alert:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Debug - verify correct file
        run: |
          echo "=== News check (should say REMOVED) ==="
          grep -n "get_news\|Top News" alert.py || echo "✅ NEWS REMOVED"
          echo "=== Portfolio check (should find lines) ==="
          grep -n "get_portfolio\|portfolio_section" alert.py || echo "❌ PORTFOLIO MISSING"

      - name: Run stock alert
        env:
          FINNHUB_KEY:        ${{ secrets.FINNHUB_KEY }}
          GMAIL_USER:         ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          ALERT_TO_EMAIL:     ${{ secrets.ALERT_TO_EMAIL }}
        run: python alert.py
