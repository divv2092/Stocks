name: Daily Stock Alert

on:
  schedule:
    - cron: '0 12 * * 1-5'
  workflow_dispatch:

jobs:
  send-alert:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Check secrets
        run: |
          echo "FINNHUB_KEY set: ${{ secrets.FINNHUB_KEY != '' }}"
          echo "GMAIL_USER set: ${{ secrets.GMAIL_USER != '' }}"
          echo "GMAIL_APP_PASSWORD set: ${{ secrets.GMAIL_APP_PASSWORD != '' }}"
          echo "ALERT_TO_EMAIL set: ${{ secrets.ALERT_TO_EMAIL != '' }}"

      - name: Run stock alert
        env:
          FINNHUB_KEY:        ${{ secrets.FINNHUB_KEY }}
          GMAIL_USER:         ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          ALERT_TO_EMAIL:     ${{ secrets.ALERT_TO_EMAIL }}
        run: python stock_alert.py
